# ============================================================================
# Enterprise Mode — Internal team deployment
# Supports external DBs (PostgreSQL, Qdrant) but falls back to embedded.
# Moderate rate limits, Tavily search recommended.
# ============================================================================

deployment_mode: enterprise

storage:
  vector_store:
    backend: milvus  # Enterprise-grade vector store
    milvus:
      host: milvus.enterprise.local  # or localhost:19530
      port: 19530
      collection_name: marine_rag
      vector_dim: 1024
    chromadb:
      persist_dir: /data/marine/chromadb
      collection_name: marine_rag
  document_index:
    backend: meilisearch  # Change to elasticsearch for distributed search
    meilisearch:
      host: http://meilisearch.enterprise.local:7700
      api_key: ""
      index_name: marine_rag_docs
    elasticsearch:
      host: http://elasticsearch.enterprise.local:9200
      index_name: marine_rag_docs
      user: ""
      password: ""
      num_shards: 1
      num_replicas: 0
  relational_db:
    backend: sqlite  # Change to postgresql for enterprise scale
    sqlite:
      path: /data/marine/marine_rag.db
    postgresql:
      host: ${PG_HOST:-postgres.enterprise.local}
      port: ${PG_PORT:-5432}
      database: marine_rag
      user: ${PG_USER:-marine}
      password: ${PG_PASSWORD}
      pool_size: 10
      max_overflow: 20
      ssl_mode: prefer
  file_store:
    backend: local_fs  # Change to minio for scale
    local_fs:
      root_dir: /data/marine/files

features:
  web_search: true
  deep_research: true
  billing: false
  multi_tenant: false

rate_limits:
  basic: 30
  pro: 120
  enterprise: -1
