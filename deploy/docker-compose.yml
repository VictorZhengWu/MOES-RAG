# ============================================================================
# Marine & Offshore Expert System — Docker Compose
# ============================================================================
# Start:  ./deploy/start.sh personal     (or .\deploy\start.ps1 personal)
#         ./deploy/start.sh personal --profile llm
# Stop:   docker compose -f deploy/docker-compose.yml down
# Logs:   docker compose -f deploy/docker-compose.yml logs -f
#
# Deployment modes (set DEPLOYMENT_MODE in deploy/.env):
#   personal    — Single user, local storage, free search engines
#   enterprise  — Internal team, external DB optional, Tavily search
#   saas        — Multi-tenant, PostgreSQL+Qdrant+Redis, Stripe billing
#
# Profiles:
#   --profile search  → Starts SearXNG (self-hosted web search)
#   --profile llm     → Starts Ollama (local LLM)
# ============================================================================

version: "3.9"

services:
  # ── Core: API Gateway + QA Engine + Retrieval + KG ──────────────────
  m8:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: m8
    container_name: marine-m8
    ports:
      - "${M8_PORT:-8000}:8000"
    environment:
      # Deployment
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-personal}
      - DEPLOY_YAML=deploy/${DEPLOYMENT_MODE:-personal}/deploy.yaml
      # Feature flags
      - FEATURE_BILLING=${FEATURE_BILLING:-false}
      - FEATURE_WEB_SEARCH=${FEATURE_WEB_SEARCH:-true}
      - FEATURE_DEEP_RESEARCH=${FEATURE_DEEP_RESEARCH:-false}
      - FEATURE_MULTI_TENANT=${FEATURE_MULTI_TENANT:-false}
      # LLM backend
      - LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-not-needed}
      - LLM_MODEL=${LLM_MODEL:-deepseek-r1:7b}
      # Web search
      - WEB_SEARCH_ENGINE=${WEB_SEARCH_ENGINE:-duckduckgo}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_CX=${GOOGLE_CX:-}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      # Internal
      - M1_PARSE_URL=http://m1:8007/parse
      - M5_DB_PATH=/data/m5_qa.db
      - M3_CHROMADB_DIR=/data/chromadb
      - M4_KUZU_DIR=/data/graph
    volumes:
      - marine_data:/data
      - ../m8-api-gateway:/app/m8-api-gateway
      - ../m5-qa-engine:/app/m5-qa-engine
      - ../m3-retrieval:/app/m3-retrieval
      - ../m4-knowledge-graph:/app/m4-knowledge-graph
      - ../m2-storage:/app/m2-storage
      - ../contracts:/app/contracts
    depends_on:
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Document Parsing Engine ─────────────────────────────────────────
  m1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: m1
    container_name: marine-m1
    ports:
      - "${M1_PORT:-8007}:8007"
    environment:
      - M1_OUTPUT_DIR=/data/output
      - M1_DEPLOY_YAML=/app/deploy.yaml
    volumes:
      - marine_data:/data
      - ../m1-doc-parsing:/app/m1-doc-parsing
      - ../m2-storage:/app/m2-storage
      - ../contracts:/app/contracts
      - ../deploy/${DEPLOYMENT_MODE:-personal}/deploy.yaml:/app/deploy.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G

  # ── Full-text search engine ─────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: marine-meilisearch
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Optional: Self-hosted web search ────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: marine-searxng
    profiles: ["search"]
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8888}/
    volumes:
      - searxng_data:/etc/searxng
    restart: unless-stopped

  # ── Optional: Local LLM ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: marine-ollama
    profiles: ["llm"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  marine_data:
  meili_data:
  searxng_data:
  ollama_data:
